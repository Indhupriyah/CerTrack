{% extends "base.html" %}
{% block content %}
<div class="auth-card">
  <h2>Sign up</h2>
  <form method="post" class="auth-form">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required autofocus>
    <label for="display_name">Display name</label>
    <input type="text" id="display_name" name="display_name" placeholder="Optional">
    <label for="password">Password</label>
    <div class="password-input-wrapper">
      <input type="password" id="password" name="password" required minlength="6">
      <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
        <span class="password-icon">👁️</span>
      </button>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Create account</button>
  </form>
  <p class="auth-footer">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
</div>

<script>
document.getElementById('passwordToggle').addEventListener('click', function(e) {
  e.preventDefault();
  const passwordInput = document.getElementById('password');
  const isPassword = passwordInput.type === 'password';
  passwordInput.type = isPassword ? 'text' : 'password';
  this.classList.toggle('active', !isPassword);
});
</script>
{% endblock %}
