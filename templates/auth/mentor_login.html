{% extends "base.html" %}
{% block content %}
<div class="auth-card mentor-login-card">
  <h2>Faculty Mentor Portal Login</h2>
  <p class="text-muted" style="margin-bottom: 1rem;">Faculty mentors: Enter your credentials to access student
    monitoring portal.</p>
  <form method="post" action="{{ url_for('auth.mentor_login') }}" class="auth-form">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required autofocus autocomplete="email"
      placeholder="mentor@institution.edu">

    <label for="password">Password</label>
    <div class="password-input-wrapper">
      <input type="password" id="password" name="password" required autocomplete="current-password"
        placeholder="••••••••">
      <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
        <span class="password-icon">👁️</span>
      </button>
    </div>

    <label class="checkbox">
      <input type="checkbox" name="remember"> Remember me
    </label>
    <button type="submit" class="btn btn-primary btn-block">Sign In</button>
  </form>
  <p class="auth-footer">
    <a href="{{ url_for('auth.login') }}">Student Portal login</a> ·
    <a href="{{ url_for('main.landing') }}">Back to home</a>
  </p>
</div>

<script>
  document.getElementById('passwordToggle').addEventListener('click', function (e) {
    e.preventDefault();
    const passwordInput = document.getElementById('password');
    const isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
    this.classList.toggle('active', !isPassword);
  });
</script>
{% endblock %}
