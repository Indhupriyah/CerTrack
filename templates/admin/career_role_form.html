{% extends "admin/base.html" %}
{% block admin_content %}
<h2>{{ 'Edit career role' if role else 'New career role' }}</h2>
<form method="post" class="card" style="max-width: 500px;">
  <label for="name">Role name *</label>
  <input type="text" name="name" id="name" value="{{ role.name if role else '' }}" required placeholder="e.g. Data Analyst">
  <label for="required_skills">Required skills (comma-separated) *</label>
  <input type="text" name="required_skills" id="required_skills" value="{{ role.required_skills if role else '' }}" placeholder="Python, SQL, Statistics">
  <label for="recommended_cert_keywords">Recommended cert keywords (comma-separated)</label>
  <input type="text" name="recommended_cert_keywords" id="recommended_cert_keywords" value="{{ role.recommended_cert_keywords if role else '' }}">
  <button type="submit" class="btn btn-primary">Save</button>
</form>
<p><a href="{{ url_for('admin.career_roles') }}">← Back</a></p>
{% endblock %}
