{% extends "admin/base.html" %}
{% block admin_content %}
<h2>Certification templates</h2>
<p><a href="{{ url_for('admin.cert_template_new') }}" class="btn btn-primary">Add template</a></p>
<table class="admin-table">
  <thead>
    <tr><th>Name</th><th>Platform</th><th>Category</th><th>Skills</th><th>Actions</th></tr>
  </thead>
  <tbody>
    {% for t in templates %}
    <tr>
      <td>{{ t.name }}</td>
      <td>{{ t.platform or '—' }}</td>
      <td>{{ t.category or '—' }}</td>
      <td>{{ (t.skill_tags or '—')[:50] }}</td>
      <td>
        <a href="{{ url_for('admin.cert_template_edit', tid=t.id) }}" class="btn btn-sm btn-secondary">Edit</a>
        <form method="post" action="{{ url_for('admin.cert_template_delete', tid=t.id) }}" style="display:inline;">
          <button type="submit" class="btn btn-sm btn-danger">Deactivate</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
